<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="VeloApp - Tu asistente financiero para negocios y trabajos independientes.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1628">

    <!-- CSP Security (Anti-Hacking) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com https://www.gstatic.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' https://generativelanguage.googleapis.com https://ve.dolarapi.com https://tessdata.projectnaptha.com;">

    <title>VeloApp — Finanzas de Negocio</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Google Fonts: Inter + Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <!-- Tesseract.js OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app-container">

    <!-- ══════════ SPLASH SCREEN ══════════ -->
    <div id="splash-screen">
        <div class="splash-logo">
            <div class="splash-v">V</div>
            <div class="splash-name">VeloApp</div>
            <div class="splash-sub">Finanzas de tu Negocio</div>
        </div>
        <div class="splash-ring"></div>
        <div class="splash-ring splash-ring-2"></div>
        <!-- Marca de agua -->
        <div class="watermark">mt</div>
    </div>

    <!-- ══════════ MAIN APP ══════════ -->
    <div id="main-app" class="hidden">

        <!-- HEADER -->
        <header id="top-header">
            <div class="logo-area">
                <div class="logo-icon">V</div>
                <div class="logo-text">
                    <span class="logo-title">VeloApp</span>
                    <span id="current-date"></span>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="rates-btn" title="Tasas de Cambio">
                    <span class="material-icons-outlined">currency_exchange</span>
                </button>
                <button class="icon-btn" id="home-btn" title="Inicio">
                    <span class="material-icons-outlined">home</span>
                </button>
                <button class="icon-btn" id="notif-btn" title="Recordatorios">
                    <span class="material-icons-outlined">notifications</span>
                    <span class="notif-badge" id="notif-badge" style="display:none"></span>
                </button>
            </div>
        </header>

        <!-- TOP NAV -->
        <nav id="top-nav">
            <button class="nav-btn" data-view="scanner" id="nav-scanner">
                <span class="material-icons-outlined">document_scanner</span>
                <span>Facturas</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="nav-btn" data-view="gastos" id="nav-gastos">
                <span class="material-icons-outlined">receipt_long</span>
                <span>Gastos</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="nav-btn" data-view="clientes" id="nav-clientes">
                <span class="material-icons-outlined">people</span>
                <span>Clientes</span>
                <div class="nav-indicator"></div>
            </button>
        </nav>

        <!-- BLACK STRIPE TOP -->
        <div class="black-stripe"></div>

        <!-- MAIN CONTENT AREA -->
        <main id="content-area">
            <!-- Views rendered here by JS -->
        </main>

        <!-- BLACK STRIPE BOTTOM -->
        <div class="black-stripe"></div>

        <!-- BOTTOM NAV -->
        <nav id="bottom-nav">
            <button class="nav-btn" data-view="creditos" id="nav-creditos">
                <span class="material-icons-outlined">credit_card</span>
                <span>Créditos</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="nav-btn" data-view="ahorros" id="nav-ahorros">
                <span class="material-icons-outlined">savings</span>
                <span>Ahorros</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="nav-btn" data-view="horarios" id="nav-horarios">
                <span class="material-icons-outlined">schedule</span>
                <span>Horarios</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="nav-btn" data-view="disponible" id="nav-disponible">
                <span class="material-icons-outlined">account_balance_wallet</span>
                <span>Disponible</span>
                <div class="nav-indicator"></div>
            </button>
        </nav>

    </div><!-- end main-app -->

</div><!-- end app-container -->

<!-- GLOBAL MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
        <div id="modal-content"></div>
    </div>
</div>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast hidden"></div>

<!-- OFFLINE BANNER -->
<div id="offline-banner" class="offline-banner hidden">
    <span class="material-icons-outlined" style="font-size:16px">wifi_off</span>
    Sin conexión — Modo Offline
</div>

<script src="security.js"></script>
<script src="ai_service.js"></script>
<script src="app.js"></script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
}
// Detector offline/online
window.addEventListener('offline', () => {
    const b = document.getElementById('offline-banner');
    if (b) b.classList.remove('hidden');
});
window.addEventListener('online', () => {
    const b = document.getElementById('offline-banner');
    if (b) b.classList.add('hidden');
});
</script>
</body>
</html>
